openapi: 3.1.0
info:
  title: 英语单词记忆 API
  version: 0.1.0
servers:
  - url: http://localhost:4000/api/v1
    description: 本地开发
paths:
  /health:
    get:
      summary: 健康检查（含数据库探测）
      operationId: getHealth
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  service:
                    type: string
                  database:
                    type: string
                  database_detail:
                    type: string
