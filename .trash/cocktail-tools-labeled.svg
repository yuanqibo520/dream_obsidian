<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="steel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f6f7f7"/>
      <stop offset="0.45" stop-color="#aeb7bb"/>
      <stop offset="1" stop-color="#eef1f2"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" x2="1">
      <stop offset="0" stop-color="#dff3ff" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#28323a" flood-opacity="0.18"/>
    </filter>
    <style>
      .bg{fill:#f7f3ea}
      .band{fill:#efe6d6}
      .title{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:46px;font-weight:700;fill:#263238}
      .sub{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:22px;fill:#5f6c72}
      .label{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:24px;font-weight:700;fill:#263238}
      .note{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:17px;fill:#68757b}
      .tag{fill:#fffaf0;stroke:#d6c6aa;stroke-width:2}
      .line{stroke:#8f7d61;stroke-width:3;stroke-linecap:round;fill:none}
      .steel{fill:url(#steel);stroke:#6f7d82;stroke-width:3}
      .glass{fill:url(#glass);stroke:#8fb4c3;stroke-width:3}
      .wood{fill:#b88755;stroke:#7f5b38;stroke-width:3}
      .dark{fill:#3d464a}
      .lime{fill:#b9d96b;stroke:#6f9439;stroke-width:3}
      .orange{fill:#f7a23b;stroke:#b86922;stroke-width:3}
    </style>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <rect class="band" y="760" width="1600" height="140"/>
  <text class="title" x="70" y="78">全套调酒工具中文标注图</text>
  <text class="sub" x="70" y="116">记忆顺序：量取 → 摇和/搅拌 → 过滤 → 处理水果 → 加冰与出杯</text>

  <g filter="url(#shadow)">
    <rect x="55" y="145" width="1490" height="610" rx="28" fill="#fffdf8" stroke="#e0d3bd" stroke-width="3"/>
  </g>

  <g transform="translate(110 210)">
    <rect class="tag" x="-25" y="-58" width="250" height="56" rx="16"/>
    <text class="label" x="0" y="-21">摇和工具</text>
    <path class="steel" d="M35 40 L185 40 L160 340 Q110 372 60 340 Z"/>
    <ellipse cx="110" cy="40" rx="75" ry="20" fill="#f8fbfb" stroke="#6f7d82" stroke-width="3"/>
    <rect x="55" y="78" width="110" height="18" rx="8" fill="#ffffff" opacity="0.45"/>
    <text class="label" x="45" y="400">雪克杯</text>
    <text class="note" x="19" y="428">摇合果汁、糖浆、奶类</text>
  </g>

  <g transform="translate(310 222)">
    <path class="glass" d="M30 35 L145 35 L130 315 Q88 340 45 315 Z"/>
    <ellipse cx="88" cy="35" rx="58" ry="15" fill="#eaf8ff" stroke="#8fb4c3" stroke-width="3"/>
    <path class="steel" d="M165 55 L260 55 L242 288 Q213 310 183 288 Z"/>
    <ellipse cx="213" cy="55" rx="48" ry="13" fill="#f8fbfb" stroke="#6f7d82" stroke-width="3"/>
    <text class="label" x="40" y="388">波士顿调酒杯</text>
    <text class="note" x="36" y="416">玻璃杯 + 金属杯，进阶摇和</text>
  </g>

  <g transform="translate(610 232)">
    <rect class="tag" x="-20" y="-80" width="250" height="56" rx="16"/>
    <text class="label" x="5" y="-43">量取工具</text>
    <path class="steel" d="M50 60 L140 60 L118 155 L72 155 Z"/>
    <path class="steel" d="M72 175 L118 175 L142 280 L48 280 Z"/>
    <rect x="75" y="150" width="40" height="30" rx="8" fill="#c9d0d3" stroke="#6f7d82" stroke-width="3"/>
    <text class="label" x="22" y="338">量酒器/盎司杯</text>
    <text class="note" x="15" y="366">常见 15/30 ml 或 30/45 ml</text>
  </g>

  <g transform="translate(840 205)">
    <rect class="tag" x="-25" y="-53" width="250" height="56" rx="16"/>
    <text class="label" x="0" y="-16">搅拌工具</text>
    <path d="M42 355 C135 270 205 140 280 20" stroke="#758187" stroke-width="10" stroke-linecap="round" fill="none"/>
    <path d="M54 346 C143 263 210 136 286 18" stroke="#eef3f4" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.75"/>
    <ellipse cx="38" cy="360" rx="43" ry="20" transform="rotate(-30 38 360)" class="steel"/>
    <text class="label" x="78" y="412">吧勺</text>
    <text class="note" x="45" y="440">高球杯搅拌、提拉气泡</text>
  </g>

  <g transform="translate(1130 200)">
    <rect class="tag" x="-35" y="-48" width="250" height="56" rx="16"/>
    <text class="label" x="-8" y="-11">过滤工具</text>
    <circle cx="90" cy="132" r="78" fill="#e6eaeb" stroke="#6f7d82" stroke-width="5"/>
    <circle cx="90" cy="132" r="52" fill="#fffdf8" stroke="#8b969a" stroke-width="3"/>
    <path d="M12 132 H-88 Q-115 132 -113 105 H-77" class="line"/>
    <path d="M160 83 Q204 64 220 100" class="line"/>
    <path d="M160 181 Q204 200 220 164" class="line"/>
    <path d="M36 88 C75 110 105 110 145 88 M28 125 C76 148 108 148 153 125 M36 175 C78 151 112 151 145 175" fill="none" stroke="#879397" stroke-width="4"/>
    <text class="label" x="-22" y="260">隔冰器</text>
    <text class="note" x="-50" y="288">挡住冰块、果肉和大颗粒</text>
  </g>

  <g transform="translate(1350 220)">
    <path d="M35 35 C95 80 122 142 120 210 C78 188 45 160 20 110 C9 82 13 57 35 35 Z" class="steel"/>
    <path d="M58 70 C89 103 101 142 98 177" fill="none" stroke="#7f8a8f" stroke-width="4"/>
    <rect x="102" y="197" width="120" height="17" rx="8" class="steel" transform="rotate(16 102 197)"/>
    <text class="label" x="-18" y="315">细滤网</text>
    <text class="note" x="-65" y="343">二次过滤细冰渣和果泥</text>
  </g>

  <g transform="translate(130 612)">
    <rect class="tag" x="-25" y="-66" width="250" height="56" rx="16"/>
    <text class="label" x="-2" y="-29">水果处理</text>
    <rect x="42" y="-8" width="44" height="160" rx="18" class="wood"/>
    <rect x="32" y="135" width="64" height="36" rx="14" fill="#8a5e37" stroke="#6f482c" stroke-width="3"/>
    <text class="label" x="15" y="218">捣棒</text>
    <text class="note" x="-18" y="246">压薄荷、青柠、糖块</text>
  </g>

  <g transform="translate(340 588)">
    <path d="M35 20 Q115 92 35 164 Q-46 92 35 20 Z" fill="#f0f3f3" stroke="#6f7d82" stroke-width="4"/>
    <path d="M35 48 Q82 92 35 136 Q-12 92 35 48 Z" class="lime"/>
    <rect x="82" y="83" width="130" height="22" rx="10" class="steel"/>
    <text class="label" x="-18" y="238">压汁器</text>
    <text class="note" x="-45" y="266">挤柠檬、青柠的新鲜汁</text>
  </g>

  <g transform="translate(590 598)">
    <rect x="5" y="70" width="190" height="28" rx="14" class="dark" transform="rotate(-18 5 70)"/>
    <path d="M180 8 L310 52 L183 92 Z" fill="#d9dedf" stroke="#6f7d82" stroke-width="3"/>
    <circle cx="48" cy="78" r="9" fill="#d6dee1"/>
    <rect x="200" y="118" width="190" height="88" rx="20" fill="#d1a06a" stroke="#8d6236" stroke-width="4"/>
    <text class="label" x="8" y="262">水果刀 + 砧板</text>
    <text class="note" x="35" y="290">切柠檬片、橙片和装饰</text>
  </g>

  <g transform="translate(980 586)">
    <rect class="tag" x="-40" y="-64" width="210" height="56" rx="16"/>
    <text class="label" x="-12" y="-27">加冰工具</text>
    <path d="M30 20 L128 20 L150 170 Q92 215 8 170 Z" class="steel"/>
    <ellipse cx="79" cy="20" rx="50" ry="15" fill="#f9fbfb" stroke="#6f7d82" stroke-width="3"/>
    <rect x="45" y="52" width="70" height="40" rx="8" fill="#dff3ff" stroke="#9bb8c5" stroke-width="3"/>
    <rect x="34" y="105" width="82" height="48" rx="8" fill="#dff3ff" stroke="#9bb8c5" stroke-width="3"/>
    <path d="M205 35 C255 80 255 140 205 185" fill="none" stroke="#79858a" stroke-width="8" stroke-linecap="round"/>
    <path d="M267 35 C217 80 217 140 267 185" fill="none" stroke="#79858a" stroke-width="8" stroke-linecap="round"/>
    <text class="label" x="6" y="252">冰桶 + 冰夹</text>
    <text class="note" x="-24" y="280">保持冰块干净，避免手拿</text>
  </g>

  <g transform="translate(1270 575)">
    <rect class="tag" x="-28" y="-53" width="210" height="56" rx="16"/>
    <text class="label" x="0" y="-16">开瓶工具</text>
    <rect x="14" y="30" width="190" height="34" rx="16" class="steel" transform="rotate(18 14 30)"/>
    <circle cx="45" cy="47" r="19" fill="#fffdf8" stroke="#6f7d82" stroke-width="5"/>
    <path d="M134 30 Q158 75 113 96" fill="none" stroke="#596367" stroke-width="8" stroke-linecap="round"/>
    <text class="label" x="-8" y="168">开瓶器</text>
    <text class="note" x="-58" y="196">开啤酒、苏打水、瓶装饮料</text>
  </g>

  <g transform="translate(1090 735)">
    <path class="glass" d="M12 20 L92 20 L82 125 Q52 143 22 125 Z"/>
    <ellipse cx="52" cy="20" rx="40" ry="10" fill="#eaf8ff" stroke="#8fb4c3" stroke-width="3"/>
    <path class="glass" d="M135 8 L230 8 L215 130 Q182 154 150 130 Z"/>
    <ellipse cx="182" cy="8" rx="48" ry="11" fill="#eaf8ff" stroke="#8fb4c3" stroke-width="3"/>
    <path class="glass" d="M275 18 L360 18 L342 126 Q315 146 292 126 Z"/>
    <ellipse cx="318" cy="18" rx="43" ry="10" fill="#eaf8ff" stroke="#8fb4c3" stroke-width="3"/>
    <text class="label" x="0" y="183">杯具：古典杯 / 高球杯 / 鸡尾酒杯</text>
    <text class="note" x="20" y="212">出杯决定体验：短饮用古典杯，长饮用高球杯</text>
  </g>

  <g transform="translate(70 790)">
    <text class="sub" x="0" y="0">必备入门：量酒器、吧勺、雪克杯、隔冰器、冰格/冰桶、高球杯。</text>
    <text class="sub" x="0" y="38">进阶补齐：波士顿调酒杯、细滤网、捣棒、压汁器、水果刀、砧板、冰夹、开瓶器。</text>
  </g>
</svg>
