    <rect x="0" y="90" width="210" height="70" rx="16" fill="#ffffff" opacity="0.72"/>
    <text x="22" y="132" class="text small">2. 倒入威士忌</text>
    <rect x="0" y="180" width="210" height="70" rx="16" fill="#ffffff" opacity="0.72"/>
    <text x="22" y="222" class="text small">3. 补入苏打水</text>
    <rect x="0" y="270" width="210" height="70" rx="16" fill="#ffffff" opacity="0.72"/>
    <text x="22" y="312" class="text small">4. 轻提拉搅拌</text>
  </g>
  <text x="60" y="565" class="text small">关键：杯冷、冰足、苏打水气足，不要剧烈搅拌。</text>
