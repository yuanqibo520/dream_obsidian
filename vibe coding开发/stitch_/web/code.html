<script>
        function switchTab(tab) {
            const indicator = document.getElementById('tab-indicator');
            const btnMobile = document.getElementById('tab-mobile');
            const btnWechat = document.getElementById('tab-wechat');
            const formMobile = document.getElementById('form-mobile');
            const formWechat = document.getElementById('form-wechat');

            if (tab === 'mobile') {
                indicator.style.transform = 'translateX(0)';
                btnMobile.classList.add('text-primary', 'font-bold');
                btnMobile.classList.remove('text-on-surface-variant');
                btnWechat.classList.remove('text-primary', 'font-bold');
                btnWechat.classList.add('text-on-surface-variant');

                formWechat.classList.add('opacity-0');
                setTimeout(() => {
                    formWechat.classList.add('hidden');
                    formWechat.classList.remove('flex');
                    formMobile.classList.remove('hidden');
                    formMobile.classList.add('flex');
                    // slight delay for fade in
                    setTimeout(() => formMobile.classList.remove('opacity-0'), 10);
                }, 300);

            } else {
                indicator.style.transform = 'translateX(100%)';
                btnWechat.classList.add('text-primary', 'font-bold');
                btnWechat.classList.remove('text-on-surface-variant');
                btnMobile.classList.remove('text-primary', 'font-bold');
                btnMobile.classList.add('text-on-surface-variant');

                formMobile.classList.add('opacity-0');
                setTimeout(() => {
                    formMobile.classList.add('hidden');
                    formMobile.classList.remove('flex');
                    formWechat.classList.remove('hidden');
                    formWechat.classList.add('flex');
                    setTimeout(() => formWechat.classList.remove('opacity-0'), 10);
                }, 300);
            }
        }
    </script>
